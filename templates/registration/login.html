<!doctype html>
<html>
  <head>
    {% load static %}
    <title>{% block title %}Laboratório Cultural — LogIn{% endblock %}</title>
    <link
      rel="icon"
      type="image/ico"
      href="{% static 'images/favicon.ico' %}"
    />
    <link rel="stylesheet" href="{% static 'css/global.css' %}" />
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
  </head>
  <body>
    <div class="container">
      <header>
        <img
          src="{% static 'images/ispgaya-logo.png' %}"
          alt="Logótipo do ISPGAYA"
          width="180"
        />
      </header>
      <main>
        <div class="section-wrapper">
          <section>
            <h1>Bem-vindo ao Backoffice<br />do Laboratório Cultural</h1>
            <form>
              <div>
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="Insira o seu email"
                  required
                />
              </div>
              <div>
                <label for="password">Palavra-passe</label>
                <input
                  type="password"
                  name="passowrd"
                  id="password"
                  placeholder="Insira a sua palavra-passe"
                  required
                />
              </div>
              <button type="submit">Entrar</button>
            </form>
          </section>
        </div>
      </main>
      <footer>
        <span>2026 · Instituto Superior Politécnico Gaya (ISPGAYA)</span>
      </footer>
    </div>
  </body>
</html>
